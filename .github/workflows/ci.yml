name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Run on PRs targeting any branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================
  # Change Detection
  # ============================================

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            react:
              - 'packages/react/**'
              - 'packages/tailwind/**'
              - 'packages/core/**'
              - 'packages/test-utils/**'
            packages:
              - 'packages/**'
            ci:
              - '.github/workflows/**'

  # ============================================
  # Always Run (on code changes)
  # ============================================

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

  # ============================================
  # Build (affected packages only)
  # ============================================

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build affected packages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Force @nexus/react: bundle-size needs its dist even when only core/scripts changes (core isn't a workspace dep of react).
            yarn turbo build --filter='...[origin/${{ github.base_ref }}]' --filter='@nexus/react'
          else
            yarn turbo build
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/**/dist
            .turbo
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # TypeScript Check (affected packages)
  # ============================================

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.packages == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: TypeScript check (affected packages)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn turbo typecheck --filter='...[origin/${{ github.base_ref }}]'
          else
            yarn turbo typecheck
          fi

  # ============================================
  # React Package Jobs
  # ============================================

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run unit tests
        run: yarn test:unit

  audit-tokens:
    name: Audit Tokens
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Regenerate @nexus/tailwind and check freshness
        run: |
          yarn tokens:tailwind
          if ! git diff --exit-code -- packages/tailwind; then
            echo "::error::packages/tailwind/ is stale — run 'yarn tokens:tailwind' and commit the result."
            exit 1
          fi

      - name: APCA contrast audit
        run: yarn workspace @nexus/core audit:contrast

      - name: Tailwind class-ref audit
        run: yarn workspace @nexus/core audit:class-refs

  test-storybook:
    name: Storybook Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: yarn test:storybook

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build Storybook
        run: yarn build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/react/storybook-static
          retention-days: 7

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Check bundle size
        run: yarn size-limit
