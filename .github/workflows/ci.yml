name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Run on PRs targeting any branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# ============================================
# Required status checks (branch protection on `main`)
# ============================================
# Every job below is listed as a required status check in branch protection
# rules on `main`. Renaming or removing any of them requires a coordinated
# protection-rule update in the same change — otherwise every subsequent PR
# blocks on a check that no longer exists.
#
#   - format-check
#   - lint
#   - build
#   - typecheck      (job name: "TypeScript Check")
#   - test-unit      (job name: "Unit Tests")
#   - audit-tokens   (job name: "Audit Tokens")
#   - test-coverage  (job name: "Test Coverage"; renamed from test-storybook
#                     when consolidated; see also #67)
#   - build-storybook
#   - bundle-size
#
# If you add or rename a required check, update both this list AND the
# protection rule.

jobs:
  # ============================================
  # Change Detection
  # ============================================

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            react:
              - 'packages/react/**'
              - 'packages/tailwind/**'
              - 'packages/core/**'
              - 'packages/test-utils/**'
            packages:
              - 'packages/**'
              - 'apps/**'
            ci:
              - '.github/workflows/**'

  # ============================================
  # format-check + lint (always run, full-tree)
  # ============================================
  #
  # These two jobs run full-tree (no `--filter='...[origin/base]'`) while
  # build, typecheck, and test run affected-only. The asymmetry is intentional:
  # local `yarn lint` / `yarn format:check` run full-tree, so CI mirrors that
  # exactly. A divergence here would let a stale rule miss a file locally that
  # CI then flags (or vice versa). Affected-only lint is also error-prone — a
  # config change in eslint.config.js must invalidate the whole tree, which
  # `--filter` won't catch. Keep these jobs full-tree until wall-clock pain
  # forces the move.

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.js') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.js') }}-
            eslint-${{ runner.os }}-

      - name: Lint
        run: yarn lint --cache --cache-location .eslintcache --cache-strategy content

  # ============================================
  # Build (affected packages only)
  # ============================================

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build affected packages
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn turbo build --filter="...[origin/$BASE_REF]"
          else
            yarn turbo build
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/**/dist
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # TypeScript Check (affected packages)
  # ============================================

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Restore Turbo cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: TypeScript check (affected packages)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn turbo typecheck --filter="...[origin/$BASE_REF]"
          else
            yarn turbo typecheck
          fi

  # ============================================
  # React Package Jobs
  # ============================================

  # Runs the `unit` vitest project under jsdom — a deliberate fast-fail signal
  # before the slower `test-coverage` job (which runs both vitest projects:
  # `unit` in jsdom and `storybook` under Playwright, plus coverage). The unit
  # project therefore runs twice in CI; the duplication is the point — this
  # job fails fast without the Playwright + coverage overhead.
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run unit tests
        run: yarn test:unit

  audit-tokens:
    name: Audit Tokens
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Regenerate @nexus/tailwind
        id: regen
        run: yarn tokens:tailwind

      - name: Check token CSS freshness
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: |
          if ! git diff --exit-code -- packages/tailwind; then
            echo "::error::packages/tailwind/ is stale — run 'yarn tokens:tailwind' and commit the result."
            exit 1
          fi

      - name: APCA contrast audit
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: yarn workspace @nexus/core audit:contrast

      - name: Tailwind class-ref audit
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: yarn workspace @nexus/core audit:class-refs

  # Required status check — see "Required status checks" block at top of file
  # before renaming or removing.
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build Storybook
        run: yarn build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/react/storybook-static
          retention-days: 7

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Check bundle size
        run: yarn size-limit
