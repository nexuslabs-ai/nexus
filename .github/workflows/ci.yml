name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Run on PRs targeting any branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Branch protection on `main` requires only the `CI Status` aggregator
# job (defined at the bottom of this file). Individual jobs are gated by
# path filters, so a docs-only PR may skip most of them — the aggregator
# treats skipped as success.

jobs:
  # ============================================
  # Change Detection
  # ============================================

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      # `packages` is true if `packages/**` changed OR if `apps/**` changed
      # outside `apps/docs/**`. See the two paths-filter steps below.
      packages: ${{ steps.filter.outputs.packages == 'true' || steps.filter-apps.outputs.apps == 'true' }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # `react` intentionally excludes `apps/**` — no app currently
            # consumes @nexus/react at runtime, so apps/ changes can't break
            # the react test/build/bundle-size jobs. Revisit if an app starts
            # importing from @nexus/react.
            react:
              - 'packages/react/**'
              - 'packages/tailwind/**'
              - 'packages/core/**'
              - 'packages/test-utils/**'
            packages:
              - 'packages/**'
            ci:
              - '.github/workflows/**'

      # Second paths-filter call so the `apps` filter can use
      # `predicate-quantifier: every` — required for `!apps/docs/**` to
      # actually negate (under the default `some`, the `apps/**` inclusion
      # wins and the negation is silently a no-op). Combined with `packages`
      # via the job-level output expression below. Drop `!apps/docs/**` when
      # @nexus/docs becomes a real package.
      - name: Detect non-docs app changes
        uses: dorny/paths-filter@v4
        id: filter-apps
        with:
          predicate-quantifier: 'every'
          filters: |
            apps:
              - 'apps/**'
              - '!apps/docs/**'

  # format-check and lint run full-tree to mirror local `yarn lint` /
  # `yarn format:check`.

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.js', 'packages/eslint-plugin-nexus/src/**') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.js', 'packages/eslint-plugin-nexus/src/**') }}-
            eslint-${{ runner.os }}-

      - name: Lint
        run: yarn lint --cache --cache-location .eslintcache --cache-strategy content

  # ============================================
  # Build (affected packages only)
  # ============================================

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build affected packages
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn turbo build --filter="...[origin/$BASE_REF]"
          else
            yarn turbo build
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/**/dist
          retention-days: 1
          if-no-files-found: warn

  # ============================================
  # TypeScript Check (affected packages)
  # ============================================

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages

      - name: Restore Turbo cache (read-only)
        uses: actions/cache/restore@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: TypeScript check (affected packages)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn turbo typecheck --filter="...[origin/$BASE_REF]"
          else
            yarn turbo typecheck
          fi

  # ============================================
  # React Package Jobs
  # ============================================

  # Fast-fail unit project; storybook project runs separately in test-react.
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

  audit-tokens:
    name: Audit Tokens
    runs-on: ubuntu-latest
    needs: changes
    # Gate on `packages` (not `react`): the freshness check covers
    # apps/playground/** and audit:class-refs scans apps/** sources.
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Run BEFORE the regen step so the build doesn't run on a broken
      # mode-file set. Validator is stdlib-only and runs in well under a
      # second — fail-fast for the cheapest possible signal.
      - name: Validate spacing mode files
        run: yarn validate:spacing-modes

      # Guard against drift between the committed canonical-step-set.json
      # and the live union across spacing-*.json. Same fail-fast tier as
      # the validator above — stdlib-only, sub-second.
      - name: Check canonical step set freshness
        run: yarn workspace @nexus/eslint-plugin refresh:canonical-set --check

      - name: Regenerate token outputs (tailwind + modular + colorblind SVG)
        id: regen
        run: |
          set -euo pipefail
          yarn tokens:tailwind
          yarn tokens:modular
          yarn workspace @nexus/core generate:colorblind-svg

      - name: Check token output freshness
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        # `git status --porcelain` (not `git diff`) so untracked new files also fail.
        run: |
          set -euo pipefail
          DIRTY=$(git status --porcelain -- \
            packages/tailwind \
            apps/playground/public/themes \
            apps/playground/src/styles \
            packages/core/docs/color-math-colorblind.svg)
          if [ -n "$DIRTY" ]; then
            echo "::error::Token output is stale. Affected paths:"
            echo "$DIRTY"
            echo "::error::Run 'yarn tokens:tailwind && yarn tokens:modular && yarn workspace @nexus/core generate:colorblind-svg' and commit the result."
            exit 1
          fi

      - name: APCA contrast audit
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: yarn workspace @nexus/core audit:contrast

      - name: Color-blind audit
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: yarn workspace @nexus/core audit:colorblind

      - name: Tailwind class-ref audit
        if: ${{ !cancelled() && steps.regen.conclusion == 'success' }}
        run: yarn workspace @nexus/core audit:class-refs

  test-react:
    name: Test (React)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # The AdjustContrast story imports @nexus/core, which is consumed via
      # its built dist/runtime entry (package.json exports). Build it so
      # Storybook/Vite can resolve the package during the story tests.
      - name: Build @nexus/core
        run: yarn workspace @nexus/core build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright system deps
        # apt-installed deps aren't part of the browser cache; always install.
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run story tests
        run: yarn test:storybook

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # The AdjustContrast story imports @nexus/core, which is consumed via
      # its built dist/runtime entry (package.json exports). Build it so the
      # Storybook production build can resolve the package.
      - name: Build @nexus/core
        run: yarn workspace @nexus/core build

      - name: Build Storybook
        run: yarn build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/react/storybook-static
          retention-days: 7

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages

      - name: Check bundle size
        run: yarn size-limit

  # ============================================
  # Aggregator — the single required status check
  # ============================================
  # Runs unconditionally so docs-only / .claude/** / repo-root PRs still
  # report a status that satisfies branch protection. Skipped upstream jobs
  # (filtered out by `if:`) are treated as success; only `failure` and
  # `cancelled` propagate.
  #
  # Contract: every required job must appear in `needs:` below — otherwise
  # its failure won't propagate through the aggregator. `changes` is
  # included so a Detect Changes failure (which would empty every
  # downstream `if:` and silently skip everything) still fails the gate.
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - format-check
      - lint
      - build
      - typecheck
      - test-unit
      - audit-tokens
      - test-react
      - build-storybook
      - bundle-size
    steps:
      - name: Fail on any required-job failure or cancellation
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled."
          exit 1
